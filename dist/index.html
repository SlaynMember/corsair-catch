<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./favicon.png" />
  <title>Corsair Catch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'PixelPirate';
      src: url('fonts/pixel_pirate/pixel_pirate.woff2') format('woff2'),
           url('fonts/pixel_pirate/pixel_pirate.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'PokemonDP';
      src: url('fonts/pokemon-dp-pro/pokemon-dp-pro.woff2') format('woff2'),
           url('fonts/pokemon-dp-pro/pokemon-dp-pro.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'PiratesBay';
      src: url('fonts/piratesbay/PiratesBay.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #0f2b30;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-shell {
      position: relative;
      /* Full viewport — Phaser Scale.FIT handles 16:9 fitting inside this */
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      border: none;
      background: #0f2b30;
    }
    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      z-index: -1;
      pointer-events: none;
    }

    /* Hide canvas during menu */
    #game-canvas.menu-open {
      display: none !important;
      visibility: hidden !important;
    }
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: 'Nunito', sans-serif;
      color: #fff; z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }
    .pixel-font { font-family: 'Press Start 2P', monospace; }
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a1628;
      color: #ffe066;
      font-family: 'PiratesBay', 'PixelPirate', sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    #rotate-prompt .rotate-icon {
      font-size: 64px;
      animation: rotate-hint 2s ease-in-out infinite;
    }
    #rotate-prompt h2 {
      font-size: 28px;
      color: #ffe066;
      margin: 0;
    }
    #rotate-prompt .instructions {
      font-family: 'PokemonDP', sans-serif;
      font-size: 16px;
      color: #F0E8D8;
      line-height: 1.6;
      max-width: 300px;
    }
    #rotate-prompt .controls-hint {
      display: flex;
      gap: 40px;
      margin-top: 8px;
      font-family: 'PokemonDP', sans-serif;
      font-size: 14px;
      color: #d4a574;
    }
    #rotate-prompt .control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #rotate-prompt .control-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #ffe066;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(255, 224, 102, 0.1);
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate-prompt.active { display: flex; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BhssP33b.js"></script>
</head>
<body>
  <div id="game-shell">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <h2>Tilt Yer Ship!</h2>
    <p class="instructions">
      Rotate your device to landscape to set sail.
    </p>
    <div class="controls-hint">
      <div class="control-item">
        <div class="control-circle">👆</div>
        <span>Left side<br/>Move</span>
      </div>
      <div class="control-item">
        <div class="control-circle">ACT</div>
        <span>Right side<br/>Interact</span>
      </div>
    </div>
  </div>
  <!-- Force font preload before Phaser boots -->
  <div style="font-family:'PixelPirate';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
  <div style="font-family:'PokemonDP';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
  <div style="font-family:'PiratesBay';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
</body>
</html>
