<body>

<script>
// ============================================================
// FISH SPRITE LAB v2 — 96×96 reference-quality pixel art fish
// Targeting: fish.png reference (rich shading, thick outlines,
//   dramatic type features, flowing fins, large eyes)
// ============================================================

const SIZE = 96;
let displayZoom = 2;
let currentFilter = null;
const pickedFish = new Map();
let allFish = [];
let animFrame = 0;

// --- Utility ---
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randf(a, b) { return Math.random() * (b - a) + a; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Parse hex color to [r,g,b]
function hex2rgb(h) {
  h = h.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function rgb2hex(r,g,b) {
  return '#' + [r,g,b].map(c => clamp(Math.round(c),0,255).toString(16).padStart(2,'0')).join('');
}
function colorLerp(c1, c2, t) {
  const a = hex2rgb(c1), b = hex2rgb(c2);
  return rgb2hex(lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t));
}
function darken(hex, amt) {
  const [r,g,b] = hex2rgb(hex);
  return rgb2hex(r*(1-amt), g*(1-amt), b*(1-amt));
}
function lighten(hex, amt) {
  const [r,g,b] = hex2rgb(hex);
  return rgb2hex(r+(255-r)*amt, g+(255-g)*amt, b+(255-b)*amt);
}

// --- 5-Shade Color Ramp Generator ---
// From a base color, generate: outline, dark, base, light, highlight
function makeRamp(base) {
  return {
    outline: darken(base, 0.55),
    dark: darken(base, 0.25),
    base: base,
    light: lighten(base, 0.3),
    highlight: lighten(base, 0.6),
  };
}

// --- Type Palettes with 5-shade ramps ---
const TYPE_DEFS = {
  fire:     { base: '#D94E1F', fin: '#FF8C42', accent: '#FFD700', belly: '#FFD4A8', featureColor: '#FF6B00', featureHighlight: '#FFEE58', badge: '#E8521A' },
  water:    { base: '#3498DB', fin: '#7EC8E3', accent: '#E0F7FA', belly: '#D6EAF8', featureColor: '#B3E5FC', featureHighlight: '#FFFFFF', badge: '#2E86DE' },
  electric: { base: '#2C3E8C', fin: '#5C6BC0', accent: '#FFD700', belly: '#9FA8DA', featureColor: '#FFEB3B', featureHighlight: '#FFFFFF', badge: '#FFD700' },
  coral:    { base: '#2E7D32', fin: '#66BB6A', accent: '#F48FB1', belly: '#C8E6C9', featureColor: '#43A047', featureHighlight: '#E8F5E9', badge: '#27AE60' },
  abyssal:  { base: '#4A148C', fin: '#9C27B0', accent: '#00E5FF', belly: '#CE93D8', featureColor: '#00BCD4', featureHighlight: '#00FFFF', badge: '#6C3483' },
  storm:    { base: '#455A64', fin: '#90A4AE', accent: '#ECEFF1', belly: '#B0BEC5', featureColor: '#CFD8DC', featureHighlight: '#FFFFFF', badge: '#5D6D7E' },
  normal:   { base: '#E6A817', fin: '#F9D56E', accent: '#FFF8E1', belly: '#FFF3C4', featureColor: '#FFE082', featureHighlight: '#FFFFFF', badge: '#D4AC0D' },
};

// --- Pixel drawing helpers ---
// Thick outlined ellipse with shading
function fillEllipse(ctx, cx, cy, rx, ry) {
  for (let y = -ry; y <= ry; y++) {
    const w = Math.round(rx * Math.sqrt(Math.max(0, 1 - (y*y)/(ry*ry))));
    if (w > 0) ctx.fillRect(Math.round(cx - w), Math.round(cy + y), w * 2, 1);
  }
}

// Outlined ellipse: draws outline ring then fill
function outlinedEllipse(ctx, cx, cy, rx, ry, outlineColor, fillColor, thickness) {
  ctx.fillStyle = outlineColor;
  fillEllipse(ctx, cx, cy, rx + thickness, ry + thickness);
  ctx.fillStyle = fillColor;
  fillEllipse(ctx, cx, cy, rx, ry);
}

// Shaded ellipse with directional lighting (top-right light)
function shadedEllipse(ctx, cx, cy, rx, ry, ramp) {
  // Outline
  ctx.fillStyle = ramp.outline;
  fillEllipse(ctx, cx, cy, rx + 2, ry + 2);
  // Dark (shadow side - bottom left)
  ctx.fillStyle = ramp.dark;
  fillEllipse(ctx, cx, cy, rx, ry);
  // Base body
  ctx.fillStyle = ramp.base;
  fillEllipse(ctx, cx - 1, cy - 1, rx - 2, ry - 2);
  // Light side (top-right)
  ctx.fillStyle = ramp.light;
  fillEllipse(ctx, cx + rx * 0.15, cy - ry * 0.2, rx * 0.6, ry * 0.5);
  // Highlight spot
  ctx.fillStyle = ramp.highlight;
  fillEllipse(ctx, cx + rx * 0.25, cy - ry * 0.35, rx * 0.2, ry * 0.2);
}

// Draw a thick pixel line between two points
function thickLine(ctx, x1, y1, x2, y2, thickness) {
  const dx = x2 - x1, dy = y2 - y1;
  const steps = Math.max(Math.abs(dx), Math.abs(dy));
  for (let i = 0; i <= steps; i++) {
    const t = steps === 0 ? 0 : i / steps;
    const x = Math.round(x1 + dx * t);
    const y = Math.round(y1 + dy * t);
    ctx.fillRect(x - Math.floor(thickness/2), y - Math.floor(thickness/2), thickness, thickness);
  }
}

// Bezier curve approximation for organic shapes
function bezierPoint(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

// Draw filled shape from outline points
function fillShape(ctx, points) {
  if (points.length < 3) return;
  // Scanline fill
  let minY = Infinity, maxY = -Infinity;
  points.forEach(p => { minY = Math.min(minY, p[1]); maxY = Math.max(maxY, p[1]); });
  minY = Math.floor(minY); maxY = Math.ceil(maxY);

  for (let y = minY; y <= maxY; y++) {
    const intersections = [];
    for (let i = 0; i < points.length; i++) {
      const j = (i + 1) % points.length;
      const [x1, y1] = points[i];
      const [x2, y2] = points[j];
      if ((y1 <= y && y2 > y) || (y2 <= y && y1 > y)) {
        const t = (y - y1) / (y2 - y1);
        intersections.push(x1 + t * (x2 - x1));
      }
    }
    intersections.sort((a, b) => a - b);
    for (let i = 0; i < intersections.length - 1; i += 2) {
      const xl = Math.round(intersections[i]);
      const xr = Math.round(intersections[i + 1]);
      ctx.fillRect(xl, y, xr - xl + 1, 1);
    }
  }
}

// Generate outline points for an organic fish body shape
function fishBodyPoints(cx, cy, bodyW, bodyH, headBulge, tailTaper, dorsalHump, bellyDrop) {
  const points = [];
  const steps = 64;

  for (let i = 0; i <= steps; i++) {
    const t = i / steps; // 0 = nose, 1 = tail
    const angle = t * Math.PI; // 0 to PI for top half

    // Base ellipse
    let x = cx + bodyW * (0.5 - t);
    let yRadius;

    if (t < 0.25) {
      // Head region - bulge
      yRadius = bodyH * (0.6 + headBulge * 0.4) * Math.sin(t / 0.25 * Math.PI / 2);
    } else if (t < 0.6) {
      // Mid body
      const mt = (t - 0.25) / 0.35;
      yRadius = bodyH * (0.8 + dorsalHump * 0.2 * Math.sin(mt * Math.PI));
    } else {
      // Tail taper
      const tt = (t - 0.6) / 0.4;
      yRadius = bodyH * (0.8 - tt * (0.5 + tailTaper * 0.3));
    }

    // Top outline
    points.push([Math.round(x), Math.round(cy - yRadius)]);
  }

  // Bottom outline (reversed, with belly)
  for (let i = steps; i >= 0; i--) {
    const t = i / steps;
    let x = cx + bodyW * (0.5 - t);
    let yRadius;

    if (t < 0.25) {
      yRadius = bodyH * (0.5 + headBulge * 0.3) * Math.sin(t / 0.25 * Math.PI / 2);
    } else if (t < 0.65) {
      const mt = (t - 0.25) / 0.4;
      yRadius = bodyH * (0.75 + bellyDrop * 0.25 * Math.sin(mt * Math.PI));
    } else {
      const tt = (t - 0.65) / 0.35;
      yRadius = bodyH * (0.7 - tt * (0.5 + tailTaper * 0.2));
    }

    points.push([Math.round(x), Math.round(cy + yRadius)]);
  }

  return points;
}

// =====================================================
// BODY SHAPES — each returns anchor points for features
// =====================================================
const BODY_SHAPES = {

  // Goldfish — round body, big flowing tail (like fire ref)
  goldfish: (ctx, ramp, def, v) => {
    const cx = 48, cy = 48;
    const bw = 28 + v.size, bh = 20 + v.size;
    const pts = fishBodyPoints(cx, cy, bw, bh, 0.8, 0.4, 0.3, 0.6);

    // Outline (thick)
    ctx.fillStyle = ramp.outline;
    fillShape(ctx, pts.map(([x,y]) => [x, y]));
    // Inflate for outline effect
    const innerPts = fishBodyPoints(cx, cy, bw - 3, bh - 3, 0.8, 0.4, 0.3, 0.6);

    // Dark base
    ctx.fillStyle = ramp.dark;
    fillShape(ctx, innerPts);
    // Mid body
    const midPts = fishBodyPoints(cx, cy, bw - 5, bh - 5, 0.8, 0.4, 0.3, 0.6);
    ctx.fillStyle = ramp.base;
    fillShape(ctx, midPts);

    // Belly highlight
    ctx.fillStyle = def.belly;
    fillEllipse(ctx, cx + 4, cy + bh * 0.2, bw * 0.45, bh * 0.35);

    // Upper light
    ctx.fillStyle = ramp.light;
    fillEllipse(ctx, cx + 6, cy - bh * 0.15, bw * 0.3, bh * 0.25);

    // Specular
    ctx.fillStyle = ramp.highlight;
    fillEllipse(ctx, cx + 8, cy - bh * 0.25, 4, 3);

    return {
      eyeX: cx + bw * 0.32, eyeY: cy - bh * 0.1,
      mouthX: cx + bw * 0.48, mouthY: cy + 3,
      tailX: cx - bw * 0.5, tailY: cy,
      dorsalX: cx + 2, dorsalY: cy - bh * 0.75,
      bellyX: cx + 4, bellyY: cy + bh * 0.55,
      bodyW: bw, bodyH: bh,
    };
  },

  // Sleek — streamlined like the water ref
  sleek: (ctx, ramp, def, v) => {
    const cx = 46, cy = 48;
    const bw = 36 + v.size, bh = 14 + v.size;
    const pts = fishBodyPoints(cx, cy, bw, bh, 0.4, 0.7, 0.15, 0.3);

    ctx.fillStyle = ramp.outline;
    fillShape(ctx, pts);
    const inner = fishBodyPoints(cx, cy, bw - 3, bh - 3, 0.4, 0.7, 0.15, 0.3);
    ctx.fillStyle = ramp.dark;
    fillShape(ctx, inner);
    const mid = fishBodyPoints(cx, cy, bw - 5, bh - 5, 0.4, 0.7, 0.15, 0.3);
    ctx.fillStyle = ramp.base;
    fillShape(ctx, mid);

    // Belly
    ctx.fillStyle = def.belly;
    fillEllipse(ctx, cx + 6, cy + bh * 0.15, bw * 0.5, bh * 0.3);
    // Light
    ctx.fillStyle = ramp.light;
    fillEllipse(ctx, cx + 8, cy - bh * 0.2, bw * 0.35, bh * 0.2);
    // Highlight
    ctx.fillStyle = ramp.highlight;
    fillEllipse(ctx, cx + 12, cy - bh * 0.3, 3, 2);

    return {
      eyeX: cx + bw * 0.35, eyeY: cy - bh * 0.08,
      mouthX: cx + bw * 0.5, mouthY: cy + 2,
      tailX: cx - bw * 0.5, tailY: cy,
      dorsalX: cx, dorsalY: cy - bh * 0.7,
      bellyX: cx + 4, bellyY: cy + bh * 0.5,
      bodyW: bw, bodyH: bh,
    };
  },

  // Chonk — fat round pufferfish
  chonk: (ctx, ramp, def, v) => {
    const cx = 48, cy = 48;
    const bw = 24 + v.size, bh = 24 + v.size;
    const pts = fishBodyPoints(cx, cy, bw, bh, 0.9, 0.2, 0.5, 0.8);

    ctx.fillStyle = ramp.outline;
    fillShape(ctx, pts);
    const inner = fishBodyPoints(cx, cy, bw - 3, bh - 3, 0.9, 0.2, 0.5, 0.8);
    ctx.fillStyle = ramp.dark;
    fillShape(ctx, inner);
    const mid = fishBodyPoints(cx, cy, bw - 5, bh - 5, 0.9, 0.2, 0.5, 0.8);
    ctx.fillStyle = ramp.base;
    fillShape(ctx, mid);

    // Big belly
    ctx.fillStyle = def.belly;
    fillEllipse(ctx, cx + 3, cy + bh * 0.15, bw * 0.5, bh * 0.45);
    ctx.fillStyle = ramp.light;
    fillEllipse(ctx, cx + 6, cy - bh * 0.1, bw * 0.35, bh * 0.3);
    ctx.fillStyle = ramp.highlight;
    fillEllipse(ctx, cx + 8, cy - bh * 0.2, 5, 4);

    return {
      eyeX: cx + bw * 0.3, eyeY: cy - bh * 0.12,
      mouthX: cx + bw * 0.45, mouthY: cy + 5,
      tailX: cx - bw * 0.45, tailY: cy,
      dorsalX: cx, dorsalY: cy - bh * 0.8,
      bellyX: cx + 2, bellyY: cy + bh * 0.6,
      bodyW: bw, bodyH: bh,
    };
  },

  // Angelfish — tall and thin
  angel: (ctx, ramp, def, v) => {
    const cx = 50, cy = 48;
    const bw = 18 + v.size, bh = 28 + v.size;

    // More vertical ellipse body
    ctx.fillStyle = ramp.outline;
    fillEllipse(ctx, cx, cy, bw + 2, bh + 2);
    ctx.fillStyle = ramp.dark;
    fillEllipse(ctx, cx, cy, bw, bh);
    ctx.fillStyle = ramp.base;
    fillEllipse(ctx, cx, cy, bw - 2, bh - 2);

    ctx.fillStyle = def.belly;
    fillEllipse(ctx, cx + 2, cy + bh * 0.2, bw * 0.5, bh * 0.35);
    ctx.fillStyle = ramp.light;
    fillEllipse(ctx, cx + 4, cy - bh * 0.15, bw * 0.4, bh * 0.25);
    ctx.fillStyle = ramp.highlight;
    fillEllipse(ctx, cx + 5, cy - bh * 0.25, 4, 3);

    return {
      eyeX: cx + bw * 0.3, eyeY: cy - bh * 0.12,
      mouthX: cx + bw * 0.5, mouthY: cy + 2,
      tailX: cx - bw * 0.6, tailY: cy,
      dorsalX: cx, dorsalY: cy - bh * 0.85,
      bellyX: cx, bellyY: cy + bh * 0.65,
      bodyW: bw, bodyH: bh,
    };
  },

  // Bass — angular, aggressive
  bass: (ctx, ramp, def, v) => {
    const cx = 46, cy = 48;
    const bw = 32 + v.size, bh = 18 + v.size;
    const pts = fishBodyPoints(cx, cy, bw, bh, 0.5, 0.6, 0.4, 0.4);

    ctx.fillStyle = ramp.outline;
    fillShape(ctx, pts);
    const inner = fishBodyPoints(cx, cy, bw - 3, bh - 3, 0.5, 0.6, 0.4, 0.4);
    ctx.fillStyle = ramp.dark;
    fillShape(ctx, inner);
    const mid = fishBodyPoints(cx, cy, bw - 5, bh - 5, 0.5, 0.6, 0.4, 0.4);
    ctx.fillStyle = ramp.base;
    fillShape(ctx, mid);

    ctx.fillStyle = def.belly;
    fillEllipse(ctx, cx + 5, cy + bh * 0.15, bw * 0.45, bh * 0.3);
    ctx.fillStyle = ramp.light;
    fillEllipse(ctx, cx + 8, cy - bh * 0.2, bw * 0.3, bh * 0.2);
    ctx.fillStyle = ramp.highlight;
    fillEllipse(ctx, cx + 10, cy - bh * 0.3, 3, 2);

    return {
      eyeX: cx + bw * 0.3, eyeY: cy - bh * 0.1,
      mouthX: cx + bw * 0.48, mouthY: cy + 2,
      tailX: cx - bw * 0.48, tailY: cy,
      dorsalX: cx - 2, dorsalY: cy - bh * 0.75,
      bellyX: cx + 2, bellyY: cy + bh * 0.55,
      bodyW: bw, bodyH: bh,
    };
  },
};

const SHAPE_NAMES = Object.keys(BODY_SHAPES);

// =====================================================
// EYES — large, expressive, reference-style
// =====================================================
function drawEye(ctx, x, y, style, ramp, irisColor) {
  x = Math.round(x);
  y = Math.round(y);
  const ic = irisColor || ramp.dark;

  switch(style) {
    case 'big': {
      // 10px diameter eye like reference
      ctx.fillStyle = ramp.outline;
      fillEllipse(ctx, x, y, 7, 7); // outline
      ctx.fillStyle = '#FFFFFF';
      fillEllipse(ctx, x, y, 5, 5); // white
      ctx.fillStyle = ic;
      fillEllipse(ctx, x + 1, y, 4, 4); // iris
      ctx.fillStyle = '#000000';
      fillEllipse(ctx, x + 1, y, 2, 2); // pupil
      // Specular highlights
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 3, y - 3, 2, 2);
      ctx.fillRect(x - 1, y + 2, 1, 1);
      break;
    }
    case 'round': {
      ctx.fillStyle = ramp.outline;
      fillEllipse(ctx, x, y, 6, 6);
      ctx.fillStyle = '#FFFFFF';
      fillEllipse(ctx, x, y, 4, 4);
      ctx.fillStyle = ic;
      fillEllipse(ctx, x + 1, y, 3, 3);
      ctx.fillStyle = '#000000';
      fillEllipse(ctx, x + 1, y + 1, 2, 2);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 2, y - 2, 2, 2);
      break;
    }
    case 'angry': {
      ctx.fillStyle = ramp.outline;
      fillEllipse(ctx, x, y, 6, 5);
      ctx.fillStyle = '#FFFFFF';
      fillEllipse(ctx, x, y, 4, 3);
      ctx.fillStyle = ic;
      fillEllipse(ctx, x + 1, y, 3, 3);
      ctx.fillStyle = '#000000';
      fillEllipse(ctx, x + 1, y, 2, 2);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 2, y - 2, 2, 1);
      // Angry brow
      ctx.fillStyle = ramp.outline;
      thickLine(ctx, x - 5, y - 6, x + 4, y - 4, 2);
      break;
    }
    case 'cute': {
      // Big shiny anime eye
      ctx.fillStyle = ramp.outline;
      fillEllipse(ctx, x, y, 7, 8);
      ctx.fillStyle = '#1a1a1a';
      fillEllipse(ctx, x, y, 5, 6);
      ctx.fillStyle = ic;
      fillEllipse(ctx, x, y - 1, 4, 4);
      ctx.fillStyle = darken(ic, 0.3);
      fillEllipse(ctx, x, y + 1, 3, 3);
      // Big highlights
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 2, y - 4, 3, 3);
      ctx.fillRect(x - 2, y + 2, 2, 2);
      break;
    }
  }
}

const EYE_STYLES = ['big', 'round', 'angry', 'cute'];

// =====================================================
// MOUTH STYLES
// =====================================================
function drawMouth(ctx, x, y, style, ramp) {
  x = Math.round(x); y = Math.round(y);
  ctx.fillStyle = ramp.outline;
  switch(style) {
    case 'small':
      ctx.fillRect(x - 1, y, 3, 2);
      break;
    case 'open':
      fillEllipse(ctx, x, y, 3, 3);
      ctx.fillStyle = '#2a0000';
      fillEllipse(ctx, x, y, 2, 2);
      break;
    case 'smile':
      // Curved smile
      ctx.fillRect(x - 4, y, 8, 2);
      ctx.fillRect(x - 5, y - 1, 2, 2);
      ctx.fillRect(x + 3, y - 1, 2, 2);
      break;
    case 'teeth':
      ctx.fillRect(x - 4, y - 2, 8, 5);
      ctx.fillStyle = '#FFFFFF';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(x - 3 + i * 2, y - 2, 1, 3);
      }
      ctx.fillStyle = '#2a0000';
      ctx.fillRect(x - 3, y + 1, 6, 1);
      break;
  }
}

const MOUTH_STYLES = ['small', 'open', 'smile', 'teeth'];

// =====================================================
// FIN STYLES — large, dramatic, reference-quality
// =====================================================
const FIN_STYLES = {

  // Flowing like the goldfish reference — BIG sweeping tail
  flowing: (ctx, ramp, def, anchors, v, frame) => {
    const wave = Math.sin(frame) * 3;
    const tx = anchors.tailX, ty = anchors.tailY;

    // === TAIL FIN — Large flowing ===
    const tailW = 16 + v.finSize * 3;
    const tailH = anchors.bodyH * 0.9;
    // Outline
    ctx.fillStyle = ramp.outline;
    for (let i = 0; i < tailW; i++) {
      const t = i / tailW;
      const spread = tailH * (0.5 + t * 0.8);
      const wv = Math.sin((t * 3 + frame) * 1.2) * (3 + t * 4);
      ctx.fillRect(Math.round(tx - i), Math.round(ty - spread + wv), 2, Math.round(spread * 2));
    }
    // Fill
    const finRamp = makeRamp(def.fin);
    ctx.fillStyle = finRamp.base;
    for (let i = 1; i < tailW - 1; i++) {
      const t = i / tailW;
      const spread = tailH * (0.4 + t * 0.75);
      const wv = Math.sin((t * 3 + frame) * 1.2) * (3 + t * 4);
      ctx.fillRect(Math.round(tx - i + 1), Math.round(ty - spread + wv + 1), 1, Math.round(spread * 2 - 2));
    }
    // Fin rays (lines through tail)
    ctx.fillStyle = ramp.outline + '66';
    for (let r = 0; r < 5; r++) {
      const ry = ty - tailH * 0.4 + r * (tailH * 0.8 / 4);
      for (let i = 0; i < tailW - 2; i++) {
        const wv = Math.sin(((i / tailW) * 3 + frame) * 1.2) * (3 + (i / tailW) * 4);
        ctx.fillRect(Math.round(tx - i), Math.round(ry + wv), 1, 1);
      }
    }

    // === DORSAL FIN ===
    const dx = anchors.dorsalX, dy = anchors.dorsalY;
    const dorsalLen = anchors.bodyW * 0.6;
    ctx.fillStyle = ramp.outline;
    for (let i = 0; i < dorsalLen; i++) {
      const t = i / dorsalLen;
      const h = Math.sin(t * Math.PI) * (10 + v.finSize * 3) + Math.sin((t * 4 + frame) * 0.8) * 2;
      ctx.fillRect(Math.round(dx - dorsalLen / 2 + i), Math.round(dy - h), 2, Math.round(h + 2));
    }
    ctx.fillStyle = finRamp.base;
    for (let i = 1; i < dorsalLen - 1; i++) {
      const t = i / dorsalLen;
      const h = Math.sin(t * Math.PI) * (8 + v.finSize * 3) + Math.sin((t * 4 + frame) * 0.8) * 2;
      if (h > 1) ctx.fillRect(Math.round(dx - dorsalLen / 2 + i + 1), Math.round(dy - h + 1), 1, Math.round(h));
    }

    // === PECTORAL FIN ===
    const px = anchors.eyeX - 8, py = anchors.bellyY - 4;
    const pwave = Math.sin(frame * 1.2) * 3;
    ctx.fillStyle = ramp.outline;
    for (let i = 0; i < 8; i++) {
      ctx.fillRect(Math.round(px + i), Math.round(py + i * 1.5 + pwave), 2, 3);
    }
    ctx.fillStyle = finRamp.light;
    for (let i = 0; i < 7; i++) {
      ctx.fillRect(Math.round(px + i + 1), Math.round(py + i * 1.5 + pwave + 1), 1, 2);
    }
  },

  // Spiked — like the bass/aggressive fish
  spiked: (ctx, ramp, def, anchors, v, frame) => {
    const wave = Math.sin(frame) * 2;
    const tx = anchors.tailX, ty = anchors.tailY;
    const finRamp = makeRamp(def.fin);

    // === FORKED TAIL ===
    const forkAngle = 0.4;
    for (let lobe = -1; lobe <= 1; lobe += 2) {
      ctx.fillStyle = ramp.outline;
      for (let i = 0; i < 14; i++) {
        const t = i / 14;
        const x = tx - i * 1.2;
        const y = ty + lobe * (4 + t * (12 + v.finSize * 3)) + wave * t;
        ctx.fillRect(Math.round(x), Math.round(y), 3, 4);
      }
      ctx.fillStyle = finRamp.base;
      for (let i = 1; i < 13; i++) {
        const t = i / 14;
        const x = tx - i * 1.2;
        const y = ty + lobe * (4 + t * (12 + v.finSize * 3)) + wave * t;
        ctx.fillRect(Math.round(x + 1), Math.round(y + 1), 2, 2);
      }
    }

    // === DORSAL SPIKES ===
    const dx = anchors.dorsalX, dy = anchors.dorsalY;
    const spikeCount = 6 + v.finSize;
    for (let i = 0; i < spikeCount; i++) {
      const t = i / (spikeCount - 1);
      const h = (i % 2 === 0 ? 14 : 8) + v.finSize * 2;
      const x = dx - anchors.bodyW * 0.3 + t * anchors.bodyW * 0.6;
      ctx.fillStyle = ramp.outline;
      ctx.fillRect(Math.round(x), Math.round(dy - h + 2), 3, Math.round(h));
      ctx.fillStyle = finRamp.base;
      ctx.fillRect(Math.round(x + 1), Math.round(dy - h + 3), 1, Math.round(h - 2));
    }

    // === PECTORAL ===
    const px = anchors.eyeX - 6, py = anchors.bellyY - 2;
    const pw = Math.sin(frame * 1.5) * 2;
    ctx.fillStyle = ramp.outline;
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(Math.round(px + i), Math.round(py + i * 2 + pw), 2, 3);
    }
    ctx.fillStyle = finRamp.light;
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(Math.round(px + i + 1), Math.round(py + i * 2 + pw + 1), 1, 2);
    }
  },

  // Ribbon — long trailing fins (angelfish / betta style)
  ribbon: (ctx, ramp, def, anchors, v, frame) => {
    const tx = anchors.tailX, ty = anchors.tailY;
    const finRamp = makeRamp(def.fin);

    // === LONG RIBBON TAIL ===
    const ribbonLen = 20 + v.finSize * 3;
    for (let strand = -1; strand <= 1; strand++) {
      ctx.fillStyle = ramp.outline;
      for (let i = 0; i < ribbonLen; i++) {
        const t = i / ribbonLen;
        const wv = Math.sin((t * 5 + frame + strand) * 0.8) * (4 + t * 8);
        const x = tx - i * 0.8;
        const y = ty + strand * 6 + wv;
        const w = Math.max(1, 4 - t * 3);
        ctx.fillRect(Math.round(x), Math.round(y), Math.ceil(w), 3);
      }
      ctx.fillStyle = finRamp.light;
      for (let i = 1; i < ribbonLen - 1; i++) {
        const t = i / ribbonLen;
        const wv = Math.sin((t * 5 + frame + strand) * 0.8) * (4 + t * 8);
        const x = tx - i * 0.8;
        const y = ty + strand * 6 + wv;
        ctx.fillRect(Math.round(x + 1), Math.round(y + 1), 1, 1);
      }
    }

    // === TALL DORSAL ===
    const dx = anchors.dorsalX, dy = anchors.dorsalY;
    const dorsalH = 14 + v.finSize * 3;
    ctx.fillStyle = ramp.outline;
    for (let i = 0; i < 12; i++) {
      const t = i / 11;
      const h = Math.sin(t * Math.PI) * dorsalH + Math.sin((t * 3 + frame) * 0.6) * 3;
      ctx.fillRect(Math.round(dx - 6 + i), Math.round(dy - h), 2, Math.round(h + 2));
    }
    ctx.fillStyle = finRamp.base;
    for (let i = 1; i < 11; i++) {
      const t = i / 11;
      const h = Math.sin(t * Math.PI) * (dorsalH - 2) + Math.sin((t * 3 + frame) * 0.6) * 3;
      if (h > 1) ctx.fillRect(Math.round(dx - 5 + i), Math.round(dy - h + 1), 1, Math.round(h));
    }

    // === LONG VENTRAL FINS ===
    const bx = anchors.bellyX, by = anchors.bellyY;
    for (let f = 0; f < 2; f++) {
      ctx.fillStyle = ramp.outline;
      for (let i = 0; i < 10 + v.finSize * 2; i++) {
        const t = i / (10 + v.finSize * 2);
        const wv = Math.sin((t * 4 + frame + f * 2) * 0.7) * (2 + t * 5);
        ctx.fillRect(Math.round(bx - 2 + f * 6 + wv), Math.round(by + i), 2, 2);
      }
      ctx.fillStyle = finRamp.light;
      for (let i = 1; i < 9 + v.finSize * 2; i++) {
        const t = i / (10 + v.finSize * 2);
        const wv = Math.sin((t * 4 + frame + f * 2) * 0.7) * (2 + t * 5);
        ctx.fillRect(Math.round(bx - 1 + f * 6 + wv), Math.round(by + i + 1), 1, 1);
      }
    }
  },

  // Stubby — small cute fins (pufferfish)
  stubby: (ctx, ramp, def, anchors, v, frame) => {
    const tx = anchors.tailX, ty = anchors.tailY;
    const finRamp = makeRamp(def.fin);
    const wave = Math.sin(frame * 1.5) * 2;

    // === SMALL ROUNDED TAIL ===
    ctx.fillStyle = ramp.outline;
    fillEllipse(ctx, tx - 4, ty + wave, 7 + v.finSize, 8 + v.finSize);
    ctx.fillStyle = finRamp.base;
    fillEllipse(ctx, tx - 4, ty + wave, 5 + v.finSize, 6 + v.finSize);
    ctx.fillStyle = finRamp.light;
    fillEllipse(ctx, tx - 3, ty - 2 + wave, 3, 3);

    // === TINY DORSAL ===
    const dx = anchors.dorsalX, dy = anchors.dorsalY;
    ctx.fillStyle = ramp.outline;
    fillEllipse(ctx, dx, dy + 2, 6, 5);
    ctx.fillStyle = finRamp.base;
    fillEllipse(ctx, dx, dy + 2, 4, 3);

    // === TINY PECTORALS ===
    const px = anchors.eyeX - 4, py = anchors.bellyY - 2;
    ctx.fillStyle = ramp.outline;
    fillEllipse(ctx, px + wave, py, 4, 3);
    ctx.fillStyle = finRamp.light;
    fillEllipse(ctx, px + wave, py, 2, 2);
  },
};

const FIN_NAMES = Object.keys(FIN_STYLES);

// =====================================================
// TYPE FEATURES — LARGE dramatic elemental additions
// =====================================================
function drawTypeFeature(ctx, type, def, ramp, anchors, frame) {
  switch(type) {

    case 'fire': {
      // BIG FLAMES rising from dorsal area (like reference goldfish)
      const flameRamp = [def.featureColor, '#FF8C00', '#FFB347', def.featureHighlight];
      const baseX = anchors.dorsalX;
      const baseY = anchors.dorsalY + 4;

      for (let col = 0; col < 8; col++) {
        const x = baseX - 10 + col * 3;
        const flameH = 10 + Math.sin(frame * 2 + col * 0.8) * 6 + Math.sin(frame * 3.5 + col * 1.2) * 3;
        const turbulence = Math.sin(frame * 2.5 + col * 1.5) * 2;

        for (let py = 0; py < flameH; py++) {
          const t = py / flameH;
          const colorIdx = Math.min(3, Math.floor(t * 4));
          ctx.fillStyle = flameRamp[colorIdx];
          const w = Math.max(1, 4 - t * 3);
          ctx.fillRect(Math.round(x + turbulence * t), Math.round(baseY - py), Math.ceil(w), 2);
        }
      }
      // Ember particles
      for (let i = 0; i < 4; i++) {
        const px = baseX - 8 + Math.sin(frame * 1.3 + i * 2) * 12;
        const py = baseY - 18 - i * 5 + Math.cos(frame * 1.5 + i) * 4;
        ctx.fillStyle = i % 2 === 0 ? def.featureHighlight : def.featureColor;
        ctx.fillRect(Math.round(px), Math.round(py), 2, 2);
      }
      break;
    }

    case 'water': {
      // Bubble cluster + water shimmer
      const bubbles = [
        [anchors.tailX + 4, anchors.tailY - 12, 4],
        [anchors.tailX - 2, anchors.tailY - 20, 3],
        [anchors.tailX + 8, anchors.tailY - 6, 2],
        [anchors.eyeX + 12, anchors.eyeY - 10, 3],
        [anchors.eyeX + 8, anchors.eyeY - 18, 2],
        [anchors.dorsalX - 5, anchors.dorsalY - 8, 2],
      ];
      bubbles.forEach(([bx, by, br], i) => {
        const bob = Math.sin(frame * 0.8 + i * 1.5) * 3;
        ctx.fillStyle = 'rgba(180,230,255,0.5)';
        fillEllipse(ctx, Math.round(bx), Math.round(by + bob), br + 1, br + 1);
        ctx.fillStyle = 'rgba(220,245,255,0.7)';
        fillEllipse(ctx, Math.round(bx), Math.round(by + bob), br, br);
        // Specular on bubble
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(Math.round(bx + br * 0.3), Math.round(by + bob - br * 0.4), 1, 1);
      });
      break;
    }

    case 'electric': {
      // Bold lightning bolts + sparks
      const boltStartX = anchors.dorsalX;
      const boltStartY = anchors.dorsalY;

      for (let bolt = 0; bolt < 3; bolt++) {
        const startX = boltStartX - 8 + bolt * 10;
        const startY = boltStartY - 2;
        let bx = startX, by = startY;

        // Glow
        ctx.fillStyle = 'rgba(255,235,59,0.3)';
        for (let seg = 0; seg < 5; seg++) {
          const nextX = bx + rand(-4, 4);
          const nextY = by - 4 - rand(0, 3);
          fillEllipse(ctx, Math.round(bx), Math.round(by), 4, 4);
          bx = nextX; by = nextY;
        }

        // Bolt
        bx = startX; by = startY;
        for (let seg = 0; seg < 5; seg++) {
          const nextX = bx + rand(-4, 4) + Math.sin(frame * 3 + bolt + seg) * 2;
          const nextY = by - 4 - rand(0, 3);
          ctx.fillStyle = def.featureHighlight;
          thickLine(ctx, Math.round(bx), Math.round(by), Math.round(nextX), Math.round(nextY), 2);
          ctx.fillStyle = def.featureColor;
          thickLine(ctx, Math.round(bx), Math.round(by), Math.round(nextX), Math.round(nextY), 1);
          bx = nextX; by = nextY;
        }
      }

      // Spark particles
      for (let i = 0; i < 6; i++) {
        const sx = anchors.dorsalX - 12 + Math.sin(frame * 2 + i * 1.1) * 16;
        const sy = anchors.dorsalY - 6 - i * 4 + Math.cos(frame * 2.5 + i) * 3;
        ctx.fillStyle = def.featureColor;
        ctx.fillRect(Math.round(sx), Math.round(sy), 2, 1);
        ctx.fillRect(Math.round(sx + 1), Math.round(sy - 1), 1, 3);
      }
      break;
    }

    case 'coral': {
      // LARGE leaf/vine/flower attachments (like coral ref)
      const leafColor = def.featureColor;
      const leafLight = def.featureHighlight;

      // Big leaves on back
      for (let leaf = 0; leaf < 4; leaf++) {
        const lx = anchors.dorsalX - 12 + leaf * 8;
        const ly = anchors.dorsalY + 2;
        const leafH = 10 + Math.sin(frame * 0.5 + leaf * 1.5) * 3;
        const lean = Math.sin(frame * 0.8 + leaf) * 3;

        // Stem
        ctx.fillStyle = darken(leafColor, 0.3);
        for (let i = 0; i < leafH; i++) {
          ctx.fillRect(Math.round(lx + lean * (i / leafH)), Math.round(ly - i), 2, 2);
        }
        // Leaf shape
        ctx.fillStyle = leafColor;
        const leafTopX = lx + lean;
        const leafTopY = ly - leafH;
        fillEllipse(ctx, Math.round(leafTopX), Math.round(leafTopY), 5 + leaf % 2 * 2, 4);
        ctx.fillStyle = leafLight;
        fillEllipse(ctx, Math.round(leafTopX + 1), Math.round(leafTopY - 1), 2, 2);
      }

      // Flower on head
      const fx = anchors.eyeX + 4, fy = anchors.eyeY - 10;
      ctx.fillStyle = def.accent;
      for (let p = 0; p < 5; p++) {
        const angle = (p / 5) * Math.PI * 2 + frame * 0.2;
        const px = fx + Math.cos(angle) * 5;
        const py = fy + Math.sin(angle) * 5;
        fillEllipse(ctx, Math.round(px), Math.round(py), 3, 3);
      }
      ctx.fillStyle = def.featureColor;
      fillEllipse(ctx, Math.round(fx), Math.round(fy), 3, 3);
      ctx.fillStyle = def.featureHighlight;
      fillEllipse(ctx, Math.round(fx), Math.round(fy), 1, 1);
      break;
    }

    case 'abyssal': {
      // Bioluminescent glow + tentacle/wisps
      // Glowing spots on body
      const glowSpots = [
        [anchors.eyeX - 6, anchors.eyeY + 3],
        [anchors.dorsalX, anchors.dorsalY + 8],
        [anchors.tailX + 8, anchors.tailY - 4],
        [anchors.tailX + 8, anchors.tailY + 6],
        [anchors.bellyX, anchors.bellyY - 4],
      ];
      glowSpots.forEach(([gx, gy], i) => {
        const pulse = 0.5 + Math.sin(frame * 1.5 + i * 1.2) * 0.5;
        ctx.fillStyle = `rgba(0,229,255,${0.15 * pulse})`;
        fillEllipse(ctx, Math.round(gx), Math.round(gy), 6, 6);
        ctx.fillStyle = `rgba(0,255,255,${0.5 * pulse})`;
        fillEllipse(ctx, Math.round(gx), Math.round(gy), 3, 3);
        ctx.fillStyle = def.featureHighlight;
        ctx.fillRect(Math.round(gx), Math.round(gy), 1, 1);
      });

      // Wisps/tentacles from bottom
      for (let w = 0; w < 3; w++) {
        const wx = anchors.bellyX - 6 + w * 8;
        const wy = anchors.bellyY;
        ctx.fillStyle = `rgba(0,188,212,0.4)`;
        for (let i = 0; i < 12; i++) {
          const t = i / 12;
          const wv = Math.sin((t * 4 + frame + w * 2) * 0.6) * (3 + t * 5);
          ctx.fillRect(Math.round(wx + wv), Math.round(wy + i * 1.5), 2, 2);
        }
      }
      break;
    }

    case 'storm': {
      // Cloud puffs + wind streaks + rain
      // Clouds above
      const cloudY = anchors.dorsalY - 6;
      ctx.fillStyle = 'rgba(200,210,220,0.6)';
      fillEllipse(ctx, anchors.dorsalX - 6, cloudY, 10, 5);
      fillEllipse(ctx, anchors.dorsalX + 6, cloudY - 2, 8, 4);
      fillEllipse(ctx, anchors.dorsalX, cloudY - 4, 7, 4);
      ctx.fillStyle = 'rgba(230,240,250,0.5)';
      fillEllipse(ctx, anchors.dorsalX - 3, cloudY - 2, 5, 3);

      // Wind streaks
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let i = 0; i < 4; i++) {
        const sx = anchors.tailX + 10 + (frame * 4 + i * 18) % 70;
        const sy = anchors.tailY - 10 + i * 8;
        ctx.fillRect(Math.round(sx), Math.round(sy), 8 + i * 2, 1);
      }

      // Rain drops
      ctx.fillStyle = 'rgba(180,200,220,0.5)';
      for (let i = 0; i < 6; i++) {
        const rx = 10 + i * 14 + Math.sin(frame + i) * 3;
        const ry = (frame * 5 + i * 15) % 80 + 8;
        ctx.fillRect(Math.round(rx), Math.round(ry), 1, 3);
      }
      break;
    }

    case 'normal': {
      // Subtle golden shimmer / sparkle
      for (let i = 0; i < 5; i++) {
        const sx = anchors.dorsalX - 10 + Math.sin(frame * 0.8 + i * 1.5) * 14;
        const sy = anchors.dorsalY + Math.cos(frame * 0.8 + i * 1.5) * 14;
        const alpha = 0.3 + Math.sin(frame * 2 + i * 1.3) * 0.3;
        if (alpha > 0.3) {
          ctx.fillStyle = `rgba(255,248,200,${alpha})`;
          // Star shape
          ctx.fillRect(Math.round(sx), Math.round(sy - 2), 1, 5);
          ctx.fillRect(Math.round(sx - 2), Math.round(sy), 5, 1);
          ctx.fillRect(Math.round(sx - 1), Math.round(sy - 1), 3, 3);
        }
      }
      break;
    }
  }
}

// =====================================================
// BODY PATTERNS
// =====================================================
function drawPattern(ctx, pattern, ramp, anchors) {
  const cx = 48, cy = 48;
  switch(pattern) {
    case 'stripes': {
      ctx.fillStyle = ramp.dark + '88';
      for (let i = 0; i < 5; i++) {
        const x = anchors.tailX + 12 + i * (anchors.bodyW * 0.2);
        for (let y = cy - anchors.bodyH * 0.5; y < cy + anchors.bodyH * 0.5; y += 1) {
          ctx.fillRect(Math.round(x), Math.round(y), 2, 1);
        }
      }
      break;
    }
    case 'spots': {
      ctx.fillStyle = ramp.dark + '88';
      const spots = [];
      for (let i = 0; i < 6; i++) {
        spots.push([cx - 10 + i * 7, cy - 6 + (i % 2) * 10, 2 + i % 2]);
      }
      spots.forEach(([x, y, r]) => fillEllipse(ctx, x, y, r, r));
      break;
    }
    case 'scales': {
      ctx.fillStyle = ramp.light + '33';
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 7; col++) {
          const sx = anchors.tailX + 14 + col * 6 + (row % 2) * 3;
          const sy = cy - anchors.bodyH * 0.3 + row * 5;
          ctx.fillRect(Math.round(sx), Math.round(sy), 3, 1);
          ctx.fillRect(Math.round(sx - 1), Math.round(sy + 1), 5, 1);
          ctx.fillRect(Math.round(sx), Math.round(sy + 2), 3, 1);
        }
      }
      break;
    }
    case 'bands': {
      ctx.fillStyle = ramp.dark + '55';
      for (let i = 0; i < 3; i++) {
        const x = anchors.tailX + 16 + i * (anchors.bodyW * 0.25);
        for (let y = cy - anchors.bodyH * 0.6; y < cy + anchors.bodyH * 0.6; y++) {
          ctx.fillRect(Math.round(x), Math.round(y), 4, 1);
        }
      }
      break;
    }
    case 'none': break;
  }
}

  'Ember', 'Frost', 'Volt', 'Reef', 'Abyss', 'Gale', 'Solar', 'Lunar', 'Iron', 'Crystal',
  'Magma', 'Tidal', 'Thunder', 'Moss', 'Void', 'Zephyr', 'Amber', 'Neon', 'Ruby', 'Onyx'];
const SUFFIXES = ['fin', 'gill', 'scale', 'jaw', 'tail', 'ray', 'fang', 'barb', 'dart', 'pike',
  'bass', 'carp', 'cod', 'perch', 'trout', 'mahi', 'tang', 'wrasse', 'goby', 'snapper'];

// =====================================================
// FISH GENERATION
// =====================================================
function generateFish(typeFilter) {
  const type = typeFilter || pick(Object.keys(TYPE_DEFS));
  const def = TYPE_DEFS[type];
  const bodyRamp = makeRamp(def.base);
  const shape = pick(SHAPE_NAMES);
  const finStyle = pick(FIN_NAMES);
  const eyeStyle = pick(EYE_STYLES);
  const mouthStyle = pick(MOUTH_STYLES);
  const pattern = pick(PATTERN_STYLES);
  const name = pick(PREFIXES) + pick(SUFFIXES);
  const variant = {
    size: rand(-2, 4),
    finSize: rand(0, 3),
  };

  const id = `${name}-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
  const TOTAL_FRAMES = 16;
  const frames = [];

  for (let f = 0; f < TOTAL_FRAMES; f++) {
    const canvas = document.createElement('canvas');
    canvas.width = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const bobY = Math.sin(f / TOTAL_FRAMES * Math.PI * 2) * 2;
    const frameAngle = f / TOTAL_FRAMES * Math.PI * 2;

    ctx.save();
    ctx.translate(0, bobY);

    // 1. Draw fins BEHIND body first (tail especially)
    // We need anchors from a dry-run — compute them without drawing
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = SIZE; tempCanvas.height = SIZE;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.imageSmoothingEnabled = false;
    const anchors = BODY_SHAPES[shape](tempCtx, bodyRamp, def, variant);

    // Draw fins behind
    FIN_STYLES[finStyle](ctx, bodyRamp, def, anchors, variant, frameAngle);

    // 2. Draw body (on top of fins)
    BODY_SHAPES[shape](ctx, bodyRamp, def, variant);

    // 3. Pattern on body
    drawPattern(ctx, pattern, bodyRamp, anchors);

    // 4. Eye
    drawEye(ctx, anchors.eyeX, anchors.eyeY, eyeStyle, bodyRamp, IRIS_COLORS[type]);

    // 5. Mouth
    drawMouth(ctx, anchors.mouthX, anchors.mouthY, mouthStyle, bodyRamp);

    ctx.restore();

    // 6. Type features (not bobbed — independent)
    drawTypeFeature(ctx, type, def, bodyRamp, anchors, frameAngle);

    frames.push(canvas);
  }

  return { id, name, type, shape, finStyle, eyeStyle, mouthStyle, pattern, frames, variant };
}

// =====================================================
// DISPLAY
// =====================================================
function renderGrid(fish) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  fish.forEach(f => {
    const card = document.createElement('div');
    card.className = 'fish-card' + (pickedFish.has(f.id) ? ' picked' : '');
    card.onclick = () => togglePick(f);

    const displayCanvas = document.createElement('canvas');
    const ds = SIZE * displayZoom;
    displayCanvas.width = ds; displayCanvas.height = ds;
    displayCanvas.style.width = ds + 'px'; displayCanvas.style.height = ds + 'px';
    card._displayCanvas = displayCanvas;
    card._fish = f;
    card.appendChild(displayCanvas);

    const nameDiv = document.createElement('div');
    nameDiv.className = 'fish-name';
    nameDiv.textContent = f.name;
    card.appendChild(nameDiv);

    const typeDiv = document.createElement('div');
    typeDiv.className = 'fish-type';
    typeDiv.style.background = TYPE_DEFS[f.type].badge;
    typeDiv.style.color = f.type === 'electric' || f.type === 'normal' ? '#000' : '#fff';
    typeDiv.textContent = f.type.toUpperCase();
    card.appendChild(typeDiv);

    const metaDiv = document.createElement('div');
    metaDiv.className = 'fish-meta';
    metaDiv.textContent = `${f.shape} · ${f.finStyle} fins · ${f.eyeStyle} eyes · ${f.pattern}`;
    card.appendChild(metaDiv);

    grid.appendChild(card);
  });
}

function animateAll() {
  const frameIdx = animFrame % 16;
  document.querySelectorAll('.fish-card').forEach(card => {
    const f = card._fish;
    const dc = card._displayCanvas;
    if (!f || !dc) return;
    const dCtx = dc.getContext('2d');
    dCtx.imageSmoothingEnabled = false;
    dCtx.clearRect(0, 0, dc.width, dc.height);
    dCtx.drawImage(f.frames[frameIdx], 0, 0, dc.width, dc.height);
  });
  requestAnimationFrame(animateAll);
}

function togglePick(fish) {
  if (pickedFish.has(fish.id)) pickedFish.delete(fish.id);
  else pickedFish.set(fish.id, fish);
  updatePickedBar();
  document.querySelectorAll('.fish-card').forEach(card => {
    if (card._fish?.id === fish.id) card.classList.toggle('picked', pickedFish.has(fish.id));
  });
}

function updatePickedBar() {
  const bar = document.getElementById('pickedBar');
  const thumbs = document.getElementById('pickedThumbs');
  if (pickedFish.size === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  thumbs.innerHTML = '';
  pickedFish.forEach(f => {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 64; c.style.width = '64px'; c.style.height = '64px';
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    cx.drawImage(f.frames[0], 0, 0, 64, 64);
    c.title = f.name;
    thumbs.appendChild(c);
  });
}

function exportPicked() {
  if (pickedFish.size === 0) return;
  pickedFish.forEach(fish => {
    const sheet = document.createElement('canvas');
    sheet.width = SIZE * 16; sheet.height = SIZE;
    const ctx = sheet.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    fish.frames.forEach((frame, i) => ctx.drawImage(frame, i * SIZE, 0));
    const link = document.createElement('a');
    link.download = `${fish.name.toLowerCase()}-${fish.type}-${SIZE}x${SIZE}.png`;
    link.href = sheet.toDataURL();
    link.click();
  });
  const manifest = [];
  pickedFish.forEach(f => manifest.push({ name: f.name, type: f.type, shape: f.shape, finStyle: f.finStyle, eyeStyle: f.eyeStyle, mouthStyle: f.mouthStyle, pattern: f.pattern, size: SIZE, frames: 16 }));
  const blob = new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = 'picked-fish-manifest.json';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function rerollAll(typeFilter) {
  allFish = [];
  for (let i = 0; i < 16; i++) allFish.push(generateFish(typeFilter || null));
  renderGrid(allFish);
}

function setZoom(z) {
  displayZoom = z;
  document.querySelectorAll('[id^="z"]').forEach(b => b.classList.remove('active'));
  document.getElementById('z' + z).classList.add('active');
  renderGrid(allFish);
}

function filterType(type) {
  currentFilter = type;
  document.querySelectorAll('[id^="f-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + (type || 'all')).classList.add('active');
  rerollAll(type);
}

// Init
rerollAll();
animateAll();
setInterval(() => { animFrame++; }, 150);
</script>
</body>
