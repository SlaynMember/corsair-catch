<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Corsair Catch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'PixelPirate';
      src: url('/fonts/pixel_pirate/pixel_pirate.woff2') format('woff2'),
           url('/fonts/pixel_pirate/pixel_pirate.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'PokemonDP';
      src: url('/fonts/pokemon-dp-pro/pokemon-dp-pro.woff2') format('woff2'),
           url('/fonts/pokemon-dp-pro/pokemon-dp-pro.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'PiratesBay';
      src: url('/fonts/piratesbay/PiratesBay.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #0f2b30;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      /* Respect safe areas (Dynamic Island, notch) via body padding */
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    #game-shell {
      position: relative;
      /* Available space = viewport minus safe-area insets (handled by body padding) */
      width: min(100vw, calc(100dvh * 16 / 9));
      height: min(100dvh, calc(100vw * 9 / 16));
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      touch-action: none;
      /* NO padding here — padding shifts canvas vs pointer coords, breaking all tap targets */
      border: none;
      background: #0f2b30;
    }
    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      z-index: -1;
      pointer-events: none;
    }

    /* Hide canvas during menu */
    #game-canvas.menu-open {
      display: none !important;
      visibility: hidden !important;
    }
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: 'Nunito', sans-serif;
      color: #fff; z-index: 10;
    }
    #ui-overlay > * { pointer-events: auto; }
    .pixel-font { font-family: 'Press Start 2P', monospace; }
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a1628;
      color: #ffe066;
      font-family: 'PixelPirate', sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 24px;
      text-align: center;
    }
    #rotate-prompt .rotate-icon {
      font-size: 64px;
      animation: rotate-hint 2s ease-in-out infinite;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <p>Rotate your device to landscape</p>
  </div>
  <!-- Force font preload before Phaser boots -->
  <div style="font-family:'PixelPirate';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
  <div style="font-family:'PokemonDP';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
  <div style="font-family:'PiratesBay';position:absolute;left:-9999px;opacity:0;pointer-events:none;">X</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
